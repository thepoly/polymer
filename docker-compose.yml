services:
  db:
    image: postgres:16
    container_name: polymer-dev-db
    # Local dev only: bump max_connections so `next build` (which parallelizes
    # prerender across all CPU cores) doesn't exhaust the default 100 cap.
    command: postgres -c max_connections=1000
    environment:
      POSTGRES_DB: polymer_dev
      POSTGRES_USER: polymer
      POSTGRES_PASSWORD: polymer
    ports:
      - "5433:5432"
    volumes:
      - polymer_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymer -d polymer_dev"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  polymer_db:
