services:
  db:
    image: postgres:14
    container_name: polymer2
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - polymer_db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  polymer_db_data:
    external: true
