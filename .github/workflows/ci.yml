name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: polymer_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d polymer_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      PAYLOAD_SECRET: ci-secret
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/polymer_ci
      LEGACY_DATABASE_URI: postgres://postgres:postgres@127.0.0.1:5432/polymer_ci
      NEXT_PUBLIC_SITE_URL: https://poly.rpi.edu
      BASE_URL: http://127.0.0.1:3000
      PLAYWRIGHT_WEB_SERVER_COMMAND: pnpm start

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Payload Migrations
        run: pnpm exec payload migrate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Install Playwright Browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Search Limit Test
        run: pnpm test:search-limit
