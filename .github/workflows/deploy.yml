name: Deploy to polymer@archlinux

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Files
        run: |
          # Sync code without nuking the directory first.
          # --delete ensures files removed from Git are removed from the server.
          # Exclude keeps node_modules and .next from being wiped during the sync.
          rsync -av --delete             --exclude '.git'             --exclude 'node_modules'             --exclude '.next'      --exclude 'media'             ./ /var/www/polymer/

          # Ensure persistent media symlink exists
          ln -sfn /var/www/polymer-media /var/www/polymer/media

      - name: Create .env file
        working-directory: /var/www/polymer
        run: |
          # Use '>' to overwrite the old .env with fresh secrets
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
          echo "PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}" >> .env

      - name: Install Dependencies
        working-directory: /var/www/polymer
        run: pnpm install --no-frozen-lockfile

      # --- ONE-TIME CLEANUP: mark existing migrations as applied (remove after first successful deploy) ---
      - name: Backfill migration history
        env:
          DATABASE_URL: "${{ secrets.DATABASE_URL }}"
        run: |
          psql "$DATABASE_URL" <<'SQL'
          DELETE FROM payload_migrations WHERE batch = -1;
          INSERT INTO payload_migrations (name, batch, updated_at, created_at)
          VALUES
            ('20260211_224237_initial_baseline', 1, NOW(), NOW()),
            ('20260213_223303_remove_copy_workflow', 1, NOW(), NOW()),
            ('20260217_015404_add_photographer_to_media', 1, NOW(), NOW()),
            ('20260310_211734_add_user_slug', 1, NOW(), NOW()),
            ('20260316_144021_add_layout_top4', 1, NOW(), NOW()),
            ('20260316_145613_remove_editorial_section', 1, NOW(), NOW())
          ON CONFLICT DO NOTHING;
          SQL

      - name: Run Migrations
        working-directory: /var/www/polymer
        env:
          DATABASE_URL: "${{ secrets.DATABASE_URL }}"
          PAYLOAD_SECRET: "${{ secrets.PAYLOAD_SECRET }}"
        run: pnpm payload migrate

      - name: Build App
        working-directory: /var/www/polymer
        env:
          DATABASE_URL: "${{ secrets.DATABASE_URL }}"
          PAYLOAD_SECRET: "${{ secrets.PAYLOAD_SECRET }}"
        run: pnpm run build

      - name: Start App
        working-directory: /var/www/polymer
        run: |
          # Reload ensures zero-downtime if possible
          pm2 describe polymer > /dev/null && pm2 reload polymer || pm2 start "pnpm start" --name "polymer"
          pm2 save